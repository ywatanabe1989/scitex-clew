codecov:
  require_ci_to_pass: false
  # Treat develop as the de-facto default branch — main is a stable
  # release mirror that only fast-forwards from develop, so develop
  # is where coverage uploads land. This makes the unbranched badge
  # endpoint (/graph/badge.svg) follow develop's value.
  branch: develop

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%

ignore:
  - "src/scitex_clew/_sphinx_html/**"
  - "src/scitex_clew/_docs/**"
  - "src/scitex_clew/_skills/**"
  - "src/scitex_clew/_completion.py"
  - "src/scitex_clew/_cli/_completion.py"
  - "tests/**"
  - "examples/**"

comment: false
