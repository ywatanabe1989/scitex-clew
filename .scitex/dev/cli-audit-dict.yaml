# scitex-dev audit-cli — per-package vocabulary additions for scitex-clew.
#
# Format expected by scitex_dev/_cli/audit/_summary/_audit.py::_load_custom_dict():
#   nouns:              [...]
#   transitive_verbs:   [...]
#   intransitive_verbs: [...]
#
# Keys must match exactly. The auditor merges this dict with its base
# catalog + Moby POS, then classifies each CLI sub-command token. A token
# listed here OVERRIDES the catalog/Moby classification (custom dict wins),
# so a noun-homonym placed under `intransitive_verbs:` is treated as a
# complete (intransitive) verb and no longer trips §1. This is the
# documented escape hatch the §1 violation message points to (the same one
# `scitex-todo next` uses).

intransitive_verbs:
  # `clew status` — git-status-like overview of verification state. The
  # action is a complete unit ("report the current verification state");
  # the leaf reads as a noun ("status") to the bare token classifier, but
  # the verb meaning is intended here, matching the `git status` /
  # `docker status` idiom operators already expect. Rename would be worse
  # UX for the package's primary at-a-glance command.
  - status

  # `clew dag` — verify the whole DAG / distribution payload (F2). The
  # action is "verify the dependency DAG"; Moby classifies "dag" as a noun
  # (and it is a domain noun), but in THIS CLI it is the intransitive verb
  # "verify-the-DAG" with the targets supplied positionally. Renaming to
  # `verify-dag` would duplicate the existing `verify` family and break the
  # established short command.
  - dag

  # `clew chain` — verify the provenance chain that produced a target. Same
  # rationale as `dag`: a domain noun used here as the intransitive verb
  # "verify-the-chain" (the target file is a positional). Established
  # command name; rename would be worse UX.
  - chain

  # `clew stamp` — record a temporal stamp (root-of-trust timestamp) for
  # successful runs. The action is a complete unit ("record a stamp");
  # "stamp" is also a standard English verb ("to stamp"), but Moby leans
  # noun-first, tripping §1. The verb meaning is intended (cf. `git tag`,
  # `notary stamp`); the sibling `list-stamps` / `check-stamp` commands
  # confirm the verb framing.
  - stamp

  # `clew verify` — verify ALL registered claims (no argument) or one run
  # when a SESSION_ID positional is given. This is the package's fail-loud
  # verify-gate: the zero-argument form ("verify everything registered") is
  # the public agent contract and MUST keep working, so it cannot be turned
  # into a required-positional `verify <SOURCE>`. The action is a complete,
  # intransitive unit ("run the verification gate"); declare it here rather
  # than break the gate's public CLI.
  - verify

  # `clew estimate` — pre-flight: predict a script/target's runtime + success
  # from run history (Phase 1 of scitex-compute-preflight-check). "estimate"
  # is a standard English verb ("to estimate the cost"); Moby classifies it
  # as both noun and verb, tripping §1 on the bare token. The verb meaning is
  # intended ("estimate this job"); the script/target is supplied
  # positionally. Renaming (e.g. `estimate-runtime`) would be redundant and
  # worse UX than the natural `clew estimate <script>`.
  - estimate
